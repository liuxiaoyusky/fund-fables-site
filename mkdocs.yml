site_name: 寓言图书馆
site_description: 寓言图书馆 —— 用故事理解世界
site_url: https://fables.skyliu.tech
copyright: Copyright &copy; 2026

theme:
  name: material
  language: zh
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - tags

# docs/downloads/ holds built PDF/DOCX/MD artefacts. The merged *.md files
# there are download artefacts, not navigation pages — but PDF/DOCX must
# still be served as static files, so we only exclude the .md ones.
exclude_docs: |
  downloads/*.md
  downloads/**/*.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/library.js
  - javascripts/reading-tracker.js
  - javascripts/reading-tools.js

