site_name: 寓言图书馆
site_description: 寓言图书馆 —— 用故事理解世界
site_url: https://fables.skyliu.tech
repo_url: https://github.com/liuxiaoyusky/fund-fables-site
repo_name: fund-fables-site
copyright: Copyright &copy; 2026

theme:
  name: material
  language: zh
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/liuxiaoyusky/fund-fables-site

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/library.js
  - javascripts/reading-tracker.js

nav:
  - 首页: index.md
  - 基金从业 · 科目二:
      - 概览: fables/fund-fables/index.md
      - 01 证券投资基金概述: fables/fund-fables/01-证券投资基金概述/01-证券投资基金简介/01-证券投资基金概念.md
      - 02 基金的类型: fables/fund-fables/02-基金的类型/01-证券投资基金分类概述/01-分类的意义.md
      - 03 投资管理基础: fables/fund-fables/03-投资管理基础/02-财务报表分析/01-财务报表分析简介.md
      - 04 权益投资: fables/fund-fables/04-权益投资/01-资本结构/01-资本结构概述.md
      - 05 固定收益投资: fables/fund-fables/05-固定收益投资/01-债券与债券市场/01-债券市场概述与分类.md
      - 06 衍生工具: fables/fund-fables/06-衍生工具/01-衍生工具概述/01-衍生工具的定义.md
      - 07 另类投资: fables/fund-fables/07-另类投资/01-另类投资概述/01-另类投资的概念与主要类别.md
      - 08 投资管理流程: fables/fund-fables/08-投资管理流程/02-投资管理流程分类/01-定制化投资管理流程.md
