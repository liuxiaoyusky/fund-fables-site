site_name: 基金从业 · 科目二寓言故事
site_url: https://liuxiaoyusky.github.io/fund.fables.part2
repo_url: https://github.com/liuxiaoyusky/fund.fables.part2
repo_name: fund.fables.part2
copyright: Copyright &copy; 2026

theme:
  name: material
  language: zh
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/liuxiaoyusky/fund.fables.part2

extra_css:
  - stylesheets/extra.css

# 导航由 MkDocs 根据 docs/ 目录结构自动生成
